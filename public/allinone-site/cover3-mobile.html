<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AllinOne V2 — Cover 3 Mobile</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; background: #E8E6E1;
    font-family: 'Noto Sans SC', -apple-system, sans-serif;
  }

  .poster {
    width: 390px; height: 844px; background: #F7F6F3;
    position: relative; overflow: hidden;
    box-shadow: 0 24px 72px rgba(0,0,0,0.10);
    display: flex; flex-direction: column;
    padding: 32px 24px;
  }

  /* Ambient */
  .bg-ambient {
    position: absolute; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse at 30% 20%, rgba(0,0,0,0.018) 0%, transparent 55%),
      radial-gradient(ellipse at 70% 80%, rgba(0,0,0,0.012) 0%, transparent 55%);
  }
  .bg-grid {
    position: absolute; inset: 0; pointer-events: none; z-index: 0; opacity: 0.4;
    background-image:
      linear-gradient(rgba(0,0,0,0.022) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,0,0,0.022) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  .bg-watermark {
    position: absolute; bottom: 8%; right: -8%;
    font-family: 'Noto Serif SC', serif; font-size: 180px; font-weight: 900;
    color: rgba(0,0,0,0.01); line-height: 1; z-index: 0; pointer-events: none;
  }

  /* ── Top bar ── */
  .top-bar {
    position: relative; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px;
  }
  .logo-row {
    display: flex; align-items: center; gap: 8px;
  }
  .logo-row img { border-radius: 4px; }
  .badge {
    display: inline-flex; align-items: center;
    padding: 4px 10px; border: 1px solid rgba(0,0,0,0.10);
    color: #787774; font-weight: 500; font-size: 10px;
    letter-spacing: 0.08em;
  }

  /* ── Content ── */
  .content {
    position: relative; z-index: 10;
    flex: 1; display: flex; flex-direction: column;
  }

  .title {
    font-family: 'Noto Serif SC', 'Songti SC', serif;
    font-weight: 900; font-size: 48px; line-height: 1.02;
    letter-spacing: -0.03em; color: #1A1A1A; margin-bottom: 6px;
  }
  .title span { color: #7C3AED; }

  .subtitle {
    font-size: 14px; font-weight: 300; color: #787774;
    margin-bottom: 12px; line-height: 1.5;
  }
  .desc {
    font-size: 12px; color: #787774; line-height: 1.6;
    margin-bottom: 16px;
  }

  .stats-row {
    display: flex; gap: 8px; margin-bottom: 16px;
  }
  .stat-item {
    flex: 1; padding: 8px 0;
    border: 1px solid rgba(0,0,0,0.06); text-align: center;
  }
  .stat-value {
    font-family: 'Noto Serif SC', serif; font-size: 18px; font-weight: 900; color: #1A1A1A;
  }
  .stat-label {
    font-size: 8px; color: #A0A09A; font-weight: 500; letter-spacing: 0.1em; margin-top: 2px;
  }

  .features {
    display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
    margin-bottom: 20px;
  }
  .ft {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 10px; font-size: 11px; color: #787774; font-weight: 400;
    background: rgba(0,0,0,0.02); border: 1px solid rgba(0,0,0,0.05);
  }
  .ft-icon {
    width: 20px; height: 20px; font-size: 12px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; opacity: 0.6;
  }
  .ft.is-new {
    background: rgba(124,58,237,0.04); border-color: rgba(124,58,237,0.12);
    color: #5B21B6; font-weight: 600;
  }
  .ft.is-new .ft-icon { opacity: 1; }

  /* ── Plugin panel ── */
  .visual {
    position: relative; z-index: 10;
    width: 100%; height: 280px;
    margin-top: auto;
  }
  .mockup {
    width: 100%; height: 100%;
    background: #fff; border: 1px solid rgba(0,0,0,0.06);
    border-radius: 6px; overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.05);
  }
  .mockup iframe {
    width: 100%; height: 100%; border: none; display: block;
  }

  /* ── Bottom bar ── */
  .bottom-bar {
    position: relative; z-index: 10;
    display: flex; justify-content: space-between;
    margin-top: 16px;
    font-size: 8px; font-weight: 500; letter-spacing: 0.12em; color: #A0A09A;
  }
</style>
</head>
<body>

<div class="poster">
  <div class="bg-ambient"></div>
  <div class="bg-grid"></div>
  <div class="bg-watermark">V2</div>

  <!-- Top bar -->
  <div class="top-bar">
    <div class="logo-row">
      <img src="Frame%2021.png" alt="AllinOne" width="32" height="32">
      <span style="font-size: 14px; color: #C0C0C0;">×</span>
      <img src="Figma.png" alt="Figma" width="32" height="32">
    </div>
    <div class="badge">FREE</div>
  </div>

  <!-- Content -->
  <div class="content">
    <h1 class="title">Allin<span>One</span></h1>
    <h2 class="subtitle">AI 驱动的 Figma 设计师提效工具集</h2>
    <p class="desc">
      AI 组件集说明书、多语言翻译、等轴形变、时空信标 — 四大新功能 + 30 余项经典工具。
    </p>

    <div class="stats-row">
      <div class="stat-item"><div class="stat-value">30+</div><div class="stat-label">FEATURES</div></div>
      <div class="stat-item"><div class="stat-value">340+</div><div class="stat-label">USERS</div></div>
      <div class="stat-item"><div class="stat-value">V2</div><div class="stat-label">VERSION</div></div>
    </div>

    <div class="features">
      <div class="ft is-new"><span class="ft-icon">🤖</span>AI 组件集说明书</div>
      <div class="ft is-new"><span class="ft-icon">🌐</span>AI 多语言翻译</div>
      <div class="ft is-new"><span class="ft-icon">🔷</span>等轴形变工具</div>
      <div class="ft is-new"><span class="ft-icon">📍</span>时空信标</div>
      <div class="ft"><span class="ft-icon">⚡</span>简易工具集</div>
      <div class="ft"><span class="ft-icon">✨</span>AI 智能填充</div>
      <div class="ft"><span class="ft-icon">🎯</span>超级选择器</div>
      <div class="ft"><span class="ft-icon">💎</span>组件清洗器</div>
    </div>

    <!-- Plugin panel -->
    <div class="visual">
      <div class="mockup">
        <iframe src="ui_2.html" title="AllinOne V2 Plugin UI"></iframe>
      </div>
    </div>
  </div>

  <!-- Bottom bar -->
  <div class="bottom-bar">
    <span>100% AI-CODED</span>
    <span>V2.0 · 2024—2026</span>
  </div>
</div>

</body>
</html>
